name: Security Scan Pipeline

on: [push]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install security tools
        run: |
          # Yahan flake8 add kiya hai
          pip install bandit safety flake8

      - name: Run Bandit (Code Scanning)
        run: bandit -r .

      - name: Run Safety (Dependency Scanning)
        run: safety check -r requirements.txt || exit 0

      # Naya Step: Code Quality Check
      - name: Run Flake8 (Code Quality)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics